<h2 id="Scrapy爬取起点网的小说列表"><a href="#Scrapy爬取起点网的小说列表" class="headerlink" title="Scrapy爬取起点网的小说列表"></a>Scrapy爬取起点网的小说列表</h2><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">准备工作（以Anconda工具为例）</span><br><span class="line">使用$ conda list 查看是否有以下的三方包</span><br><span class="line">$ request pip scrapy lxml reponse</span><br></pre></td></tr></table></figure>

<p>创建项目</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">cd 你要存放项目的盘符路径</span><br><span class="line">scrapy startproject 文件名</span><br><span class="line">创建的时候可能会遇到报错找不到指定文件</span><br><span class="line">需要先确定自己使用的pip是否是高版本</span><br><span class="line">然后通过python -m pip install --upgrade pip升级</span><br><span class="line">再安装pip install -I cryptography </span><br><span class="line">就可以创建scrapy项目了</span><br></pre></td></tr></table></figure>

<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">起点网爬取</span><br><span class="line">分析网页  </span><br><span class="line">小说名称 div[@class&#x3D;&quot;book-mid-info&quot;]&#x2F;h4&#x2F;a&#x2F;text()</span><br><span class="line">作者 div[@class&#x3D;&quot;book-mid-info&quot;]&#x2F;p[1]&#x2F;a[1]&#x2F;text()</span><br><span class="line">类型 div[@class&#x3D;&quot;book-mid-info&quot;]&#x2F;p[1]&#x2F;a[2]&#x2F;text()</span><br><span class="line">形式 div[@class&#x3D;&quot;book-mid-info&quot;]&#x2F;p[1]&#x2F;span&#x2F;text()</span><br></pre></td></tr></table></figure>

<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br></pre></td><td class="code"><pre><span class="line">执行步骤</span><br><span class="line">导入request 和 Spider类</span><br><span class="line">$ from scrapy import requset</span><br><span class="line">$ from scrapy.spiders import Spider</span><br><span class="line">定义一个类</span><br><span class="line">$ class 类名(Spider)</span><br><span class="line">定义爬虫名称</span><br><span class="line">$ name &#x3D;&quot;爬虫名称&quot;			#必填项</span><br><span class="line">$ start_urls&#x3D;[URL] 			#起始页面，要爬取的页面</span><br><span class="line">$ def parse(self,respose)  	 #解析函数  parse()是Spider类的核心方法</span><br><span class="line">$ list &#x3D;response.xpath(&quot;&quot;) 	定义到爬取的父元素，保存到列表里</span><br><span class="line">$ for one in list: 遍历小说内容</span><br><span class="line">$ name &#x3D;one.xpath().extract()[0]  获取对应的名称</span><br><span class="line">$ one_dict&#x3D;&#123;&quot;key&quot;:value&#125;  创建字典</span><br><span class="line">$ yield one_dict  返回字典</span><br><span class="line"></span><br><span class="line">定义Spider类 - &gt; 确定Spider的名称 (name) - &gt;获取初始请求 (start_resquests()) - &gt;解析数据 parse()</span><br></pre></td></tr></table></figure>

<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">执行爬虫 $ cd 页面目录  ！重要</span><br><span class="line">$ scrapy crawl zy -o spider_hot.csv  # zy 为爬虫名 spider_hot.csv为保存数据文件名</span><br></pre></td></tr></table></figure>

<h2 id="爬虫伪装，设置解析数据的回调函数"><a href="#爬虫伪装，设置解析数据的回调函数" class="headerlink" title="爬虫伪装，设置解析数据的回调函数"></a>爬虫伪装，设置解析数据的回调函数</h2><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">设置用户代理</span><br><span class="line">one_headers&#x3D;&#123;&#125;  从浏览器获取headers 下的User-Agent</span><br><span class="line">重写Start_request()方法</span><br><span class="line">def start_request(self):</span><br><span class="line">url&#x3D;&quot;&quot;		#请求访问第</span><br><span class="line">yield&#x3D; Request(url,headers&#x3D;self.one_headers,callback&#x3D;self.one_parse) #headers 请求头信息 callback 回调函数</span><br></pre></td></tr></table></figure>
